name: Release

# Fully automated: every push to main runs semantic-release, which reads the
# Conventional Commits, and — when there's something to ship — computes the
# version, builds the macOS app, publishes to npm, and cuts a GitHub Release
# with the .app zip. No version commit is pushed back to main (tag only).
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create the tag + GitHub Release

jobs:
  release:
    runs-on: macos-latest # building a .app requires macOS
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned build, skip signing
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bunx biome ci .

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bunx semantic-release
