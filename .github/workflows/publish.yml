name: Publish

# Cut a release by pushing a tag: `git tag v0.1.0 && git push origin v0.1.0`.
# This builds the macOS app, publishes to npm (public), and creates a GitHub
# Release with the .app zip attached.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

jobs:
  publish:
    runs-on: macos-latest # building a .app requires macOS
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned build, skip signing
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bunx biome ci .

      - name: Verify package version matches the tag
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match tag ($TAG)" >&2
            exit 1
          fi

      - name: Build the macOS app (.zip)
        run: bun run dist

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" dist/*.zip --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
